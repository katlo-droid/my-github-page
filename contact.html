<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Logan</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        
        <a class="navbar-brand" href="index.html">Logan</a>

        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="skills.html">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>
          </ul>

          
          <button id="modeToggle" class="btn btn-outline-light ms-3">🌙</button>
        </div>
      </div>
    </nav>

    
    <div class="container text-center my-5">
      <h1>Contact Me</h1>
      <p>Let's get in touch!</p>
    </div>
  </header>

  
  <section class="container my-5">
    <h2 class="text-center mb-3">Let's Connect</h2>
    <p class="text-center mb-4">If you'd like to reach me, send me a message below.</p>

    <form action="https://formspree.io/f/maqpwjvp" method="POST" class="mx-auto" style="max-width: 500px;">
      <div class="mb-3">
        <label class="form-label">Your Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Your Email</label>
        <input type="email" name="email" class="form-control" placeholder="Your email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Your Message</label>
        <textarea name="message" class="form-control" rows="5" placeholder="Write your message" required></textarea>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-primary">Send Message</button>
      </div>
    </form>
  </section>

  
  <footer class="text-center my-4">
    <p>© 2026 Logan</p>
    <p>ご覧いただきありがとうございます</p>
    <p>Goran itadaki arigatō gozaimasu</p>
  </footer>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  
  <script>
    const toggleBtn = document.getElementById('modeToggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      toggleBtn.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    });
  </script>

</body>

</html>
